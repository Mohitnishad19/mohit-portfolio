<!DOCTYPE html>
<html>
<head>
    <title>Mohit Portfolio</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            padding: 40px;
        }

        img {
            width: 140px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 20px #fff;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            margin-top: 15px;
            font-size: 28px;
        }

        p {
            opacity: 0.9;
        }

        .btn {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: white;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            background: black;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.15);
            margin: 20px auto;
            padding: 20px;
            width: 280px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .social a {
            text-decoration: none;
        }

        .social button {
            background: #25D366;
            color: white;
        }

        #msg {
            margin-top: 10px;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

    <img src="https://via.placeholder.com/150" alt="profile">

    <h1>Mohit Nishad </h1>
    <p>BCA Student | Future Developer 🚀</p>

    <button class="btn" onclick="showMsg()">About Me</button>

    <div class="card">
        <h3>Skills 💻</h3>
        <p>C, C++, HTML, CSS, photography (Learning)</p>
    </div>

    <div class="card">
        <h3>Projects 🚀</h3>
        <p>Snake Game in C++<br>Portfolio Website</p>
    </div>

    <div class="card">
        <h3>Contact 📞</h3>
        <p>Email: mohit065@email.com</p>
    </div>

    <div class="social">
        <a href="https://wa.me/9669305819">
            <button class="btn">WhatsApp</button>
        </a>

        <a href="https://instagram.com/@_mohit_lifestyle">
            <button class="btn">Instagram</button>
        </a>
    </div>

    <p id="msg"></p>

</div>

<script>
function showMsg() {
    document.getElementById("msg").innerText =
    "I am passionate about coding and building cool projects 😎🔥";
}
</script>

</body>
</html>
